<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Form Apply For Buy Diffrent Product</h1>

    <form action="post">
        <div>
            <label for="username">Enter your Username</label>
        </div>
        <div>
            <!-- <label for="username">Enter your Username</label> -->
            <input type="text" id=username" name="username" placeholder="Enter your Username">
        </div>
        <div>
            <label for="Password">Password:</label>
        </div>
        <div>
            <input type="text" name="Password" placeholder="Enter your Password" id="Password">
        </div>
        <div>
            <label for="Select Gender">Select Gender:</label>
        </div>
        <div>
            <input type="radio" name="gender" id="male">
            <label for="male">male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">female</label>
        </div>
        <div>
            <label for="Choose State">Choose State:</label>
        </div>
        <div>
            <select name="State">
                <option value=""></option>
                <option value="Bihar">Bihar</option>
                <option value="Punjab">Punjab</option>
                <option value="kolkata">kolkata</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Banguluru">Banguluru</option>
            </select>
        </div>
        <div>
            <label for="Choose Product">Choose Product:</label>
        </div>
        <div>
            <select name="Product">
                <option value=""></option>
                <option value="Shose">Shose</option>
                <option value="T Shirt">T Shirt</option>
                <option value="Blazer">Blazer</option>
                <option value="Watch">Watch</option>
                <option value="Shirt">Shirt</option>
            </select>
            <div>
                <input type="submit" value="                             Submit                          ">
            </div>
        </div>
    </form>
</body>

</html>
