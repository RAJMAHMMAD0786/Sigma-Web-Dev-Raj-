<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flext Box</title>

    <style>

        .container {
            border: 2px solid black;
            display: flex;
            height: 90vh;
            justify-content: center;
            align-items: center;
            align-content: center;
            /* flex-direction: column; */
            flex-wrap: wrap;
            

            /* there is no justify-items in flexbox  */

            flex-flow: row wrap;

            /* gap: 50px; */
            /*row-gap: 30px;
            column-gap: 10px; */
            gap: 40px 10px;

        }

        .item {
            /* bydefault flex-grow =0 */
            /* flex-grow: 1; */

            height: 95px;
            width: 95px;
           
            background-color: brown;
            border: 2px solid black;
            /* margin: 5px; */
            text-align: center;
            justify-content: center;
            align-items: center;
            align-content: center;

        }

        .order-1{
            order: 1;
        }

        .order-2{
            order: 2;
        }

        .order-3{
            order: 3;
        }

        .item1{
            /* flex-grow: 2; */
            flex-shrink: 2;

            /* align-self: jis box ke uper Isako likha jata hai us box ke move kiya ja sakta hai */
            /* align-self: self-end; */
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- <div class="item order-1">1</div> -->
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item order-1">4</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        
    </div>
</body>

</html>



<!--flex-wrap: wrap  , Isaka used kiya jata hai jab bahut jayada box hota hai or yek hi line mai overflow karta hai tab next line se dikhane ke liye flex-wrap: wrap; ka used kiya jata hai   -->


<!-- align-items: center  , Isaka used kiya jata hai jab yek line hota hai to box ko center main lane ke liye used kiya jata hai -->


<!-- align-content: center  , Isaka used tab kiya jata hai  jab yek se jayada box ka line hota hai to box ke line ko center mai karne ke liye used kiya jata hai -->
