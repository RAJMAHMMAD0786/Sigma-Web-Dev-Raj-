<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- scaleX: Scales the element on the X-axis. -->
        <div class="box">
            <div class="blue scaleX">
                scaleX
            </div>
        </div>

        <!-- scaleY: Scales the element on the Y-axis. -->
        <div class="box">
            <div class="blue scaleY">
                scaleY
            </div>
        </div>

        <!-- scale: Scales the element on the Y-axis. -->
        <div class="box">
            <div class="blue scale">
                scale
            </div>
        </div>

        <!-- translate: translate the element on the X-axis. -->
        <div class="box">
            <div class="blue translateX">
                translateX
            </div>
        </div>

        <!-- translate: translate the element on the Y-axis. -->
        <div class="box">
            <div class="blue translateY">
                translateY
            </div>
        </div>

        <!-- translate: translate the element on the X-axis. -->
        <div class="box">
            <div class="blue translate">
                translate
            </div>
        </div>


        <!-- rotate: rotate the element on the -->
        <div class="box">
            <div class="blue rotate">
                rotate
            </div>
        </div>

         <!-- rotate: rotate the element on the X-axis-->
         <div class="box">
            <div class="blue rotateX">
                rotateX
            </div>
        </div>

         <!-- rotate: rotate the element on the Y-axis-->
         <div class="box">
            <div class="blue rotateY">
                rotateY
            </div>
        </div>


         <!-- skew: skew the element on the -->
         <div class="box">
            <div class="blue skew">
                skew
            </div>
        </div>

        <!-- skew: skew the element on the X-axis-->
        <div class="box">
            <div class="blue skewX">
                skewX
            </div>
        </div>

        <!-- skew: skew the element on the Y-axis-->
        <div class="box">
            <div class="blue skewY">
                skewY
            </div>
        </div>

    </div>
</body>

</html>
