        /* psedo elements */
        .boxes::before {
            content: "Rajmahmmad is good";
            background-color: aqua;
            color: red;
        }

        .boxes::after {
            content: "Harry bhaiya is good teacher";
            background-color: blueviolet;
            color: coral;

        }

        ::selection {
            color: aqua;
            background-color: black;
        }

        .box::first-letter {
            color: peru;
            font-size: 40px;
        }

        input::placeholder {
            color: red;
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="boxes">

        <div data-color="primary" class="box">I am first box
        </div>
        <div class="box">I am box second</div>
        <div class="box">Hey I am box thired</div>

        <label for="username">Name :</label>
        <input type="text" name="" id="username" placeholder="Enter your name here">

    </div>
</body>
