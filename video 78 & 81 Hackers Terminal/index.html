<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackers Terminal</title>
    <style>
        body {
            background-color: green;
            color: white;
            font-size: 30px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <!-- Create a hacking simulator which has green background and its shows these massege with random delay of 1 to 7 second.

    Initializing Hacking...
    Reading your files...
    password files Detected...
    Sending all passwords and personal files to server...
    Cheanging Up...

    The three dots must blink so that it look like a real terminal

     -->




    <script>

        const addItem = async (item) => {
            await randomDelay();
            let div = document.createElement("div");
            div.innerHTML = item;
            document.body.append(div)
        }

        const randomDelay = () => {
            return new Promise((resolve, reject) => {
                timeout = 1 + 6 * Math.random();
                setTimeout(() => {
                    resolve()
                }, timeout * 1000);
            })
        }


        async function main() {


             let text = ["Initializing Hacking",
                "Reading your files",
                "password files Detected",
                "Sending all passwords and personal files to server",
                "Cheanging Up"]

            // setInterval(() => {
            //     let last=document.body.getElementsByTagName("div");
            //     last=last[last.length-1]

            //     if(last.innerHTML.endswith("...")){
            //         last.innerHTML=last.innerHTML.slice(0,-3)
            //     }
            //     else{
            //         last.innerHTML=last.innerHTML + "."
            //     }
            // }, 500);


              setInterval(() => {
                let allDivs = document.body.getElementsByTagName("div");
                if (allDivs.length === 0) return;
                let last = allDivs[allDivs.length - 1];

                if (last.innerHTML.endsWith("...")) {
                    last.innerHTML = last.innerHTML.slice(0, -3);
                } else {
                    last.innerHTML += ".";
                }
            }, 500); // blinking speed
            

            for (const item of text) {
                await addItem(item)
            }
        }

        main();

    </script>

</body>

</html>
