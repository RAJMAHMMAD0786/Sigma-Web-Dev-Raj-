<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display properties</title>
    <style>
        /* class selector */
        .box {
            border: 2px solid black;
            display:inline-block;
            padding: 30px;
            margin: 45px;
            width: 344px;
        }

    </style>
</head>

<body>
    <div class="box box1">
        I am box tag1
    </div>

    <div class="box box1">
        I am box tag2
    </div>

    <div class="box">
        I am an another box tag
    </div>

    <span>I am span tag</span>
    <span>I am an another span tag</span>
</body>

</html>
