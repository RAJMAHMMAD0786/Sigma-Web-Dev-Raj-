<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filter</title>

    <style>
        .container {}

        img {
            /* filter: blur(10px); */
        }

        .img1 {
            filter: brightness(140%) contrast(140%);
        }

        .img2 {
            /* filter: invert(75%); */
            /* filter: opacity(25%); */
            filter: sepia(60%);

        }

        .img3 {
            filter: grayscale(200%);
        }

        .img4 {
            filter: brightness(135%);
        }
        
    </style>
</head>

<body>
    <div class="container">



        <img class="img1"
            src="https://media.sciencephoto.com/image/f0366809/800wm/F0366809-Big_data_cybersecurity,_illustration.jpg"
            alt="">

        <img class="img2" width="530" src="https://i.pinimg.com/736x/84/53/17/84531730b60295077d97f4e73972d651.jpg"
            alt="">

        <img class="img3" width="550"
            src="https://cdn.britannica.com/91/267391-050-9025A36D/indian-actor-akshay-kumar-red-sea-international-film-festival-december-2022.jpg"
            alt="">

        <img class="img4" width="530" src="WhatsApp Image 2025-04-23 at 16.51.25_9d316282.jpg" alt="">

    </div>
</body>

</html>
