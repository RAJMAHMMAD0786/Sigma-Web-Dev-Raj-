<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            background-color: bisque;
            width: 40vw;
            height: 50vh;
            margin: 20px;
        }

        .box{
            background-color: aquamarine;
            width: 4vw;
            height: 5vh;

            /* transition */

            /* transition-property: color, background-color,transform; */

            transition-property:all;
            transition-duration: 3s;
            transition-timing-function:cubic-bezier(0.28,-0.02, 0, 0.99);
            transition-delay: 5s;
            



            /* Yek line mai bhi likha ja sakta hai */
            /* transition: all 3s cubic-bezier(0.28,-0.02, 0, 0.99) 1s; */

        }

        .translate{
            transform: translateX(10vw) translateY(10vh) scale(2);
            background-color: blue;
            color: red;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="box translate">box</div>
    </div>
</body>

</html>
