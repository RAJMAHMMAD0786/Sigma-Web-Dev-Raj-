<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animation</title>
    <style>
        
        .container {
            background-color: blue;
            width: 100vw;
            height: 80vh;

            position: relative;

        }

        .raj {
            text-align: center;
            color: gray;
            font-weight: 900;
            font-family: sans-serif;

        }

        .boll {
            width: 90px;
            height: 80px;
            background-color: red;
            color: white;
            font-size: 40px;
            font-family: sans-serif;

            position: absolute;
            bottom: 0;
            left: 0;

            border-radius: 75px;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;


            /* Animation */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            
            animation-name: boll;
            animation-duration: 10s;
            animation-timing-function: linear;
            animation-delay: 1s;
            animation-iteration-count: infinite;
            animation-direction: normal;

        }


        /* left-X and buttom-Y */

        @keyframes boll {

            0% {
                left: 0%;
                bottom: 0;
            }

            10% {
                left: 10%;
                bottom: 80%;
            }

            20% {
                left: 20%;
                bottom: 0%;
            }

            30% {
                left: 30%;
                bottom: 80%;
            }

            40% {
                left: 40%;
                bottom: 0%;
            }

            50% {
                left: 50%;
                bottom: 80%;
            }

            60% {
                left: 60%;
                bottom: 0%;
            }

            70% {
                left: 70%;
                bottom: 80%;
            }

            80% {
                left: 80%;
                bottom: 0%;
            }

            90% {
                left: 90%;
                bottom: 90%;
            }

            95% {
                left: 95%;
                bottom: 0%;
            }
        }

    </style>

</head>

<body>
    <div class="container">

        <div class="raj">
            <h1>RAJ MAHMMAD</h1>
        </div>

        <div class="boll">
            Boll
        </div>
    </div>
</body>

</html>
