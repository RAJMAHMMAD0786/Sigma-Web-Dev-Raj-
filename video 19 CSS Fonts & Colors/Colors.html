<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors</title>
    <style>
        h1 {
            /*1. Color keyword */
            /* color: darkred; */

            /*2. Hex color code */
            /* color: #0f7ff5; */
            /* color: #992020; */

            /* color: rgb(210, 215, 219); */
            /* color: rgba(190, 198, 107, 0.363); */
            /* color: hsl(319, 83%, 18%); */
            color: hsla(289, 58%, 39%, 0.64);

        }

        p{

        }

        ol{

<body>

    <p>
        Color can be represented in
    <ol>
        <li>Color keyword</li>
        <li>Hex color code</li>
        <li>RGB</li>
        <li>RGBA</li>
        <li>HSL</li>
        <li>HSLA</li>
    </ol>
    </p>

</html>
