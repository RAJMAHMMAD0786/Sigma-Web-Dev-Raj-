<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav bar</title>
    <style>
        .logo{
            /* background-color: aqua; */
        }

        .logo img{
            width: 170px;
            cursor: pointer;
        }

        .logo img:hover{
            background-color: yellow;
        }

        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;

            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .right ul{
            display: flex;
            gap: 40px;
        }

        .right ul li{
            list-style: none;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .right ul li span{
            padding: 0px 5px;
        }

        .right ul li:hover{
            background-color: yellow;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE-Logo-1.webp" alt="">
            </div>
            <div class="right">
                <ul>
                    <li><span>Product</span><img width="14" height="14" src="chevron-down.svg" alt=""></li>
                    <li><span>Pricing</span><img width="14" height="14" src="chevron-down.svg" alt=""></li>
                    <li><span>Resources</span><img width="14" height="14" src="chevron-down.svg" alt=""></li>
                    <li><span>About Us</span><img width="14" height="14" src="chevron-down.svg" alt=""></li>
                </ul>
            </div>
        </nav>
    </header>
</body>

</html>
