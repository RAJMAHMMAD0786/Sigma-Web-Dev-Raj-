<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript DOM And BOM</title>
</head>

<body>

    <!-- class selector -->
    <div class="container">
        This is a container
    </div>

    <!-- id selector  -->
    <div id="box">
            I am a Box
        </div>

    <script>

        document.title = "Raj Mahmmad :";

        console.log(document.title);
        console.log(document.body);

        document.body.style.backgroundColor = "red";


        // change the container text
        document.querySelector(".container").innerHTML="This is not a container"

        // change the box text
        document.getElementById("box").innerHTML="I am Not a box"

    </script>
</body>

</html>
