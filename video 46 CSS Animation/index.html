<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ANIMATION</title>
    <style>
        .container {
            background-color: cadetblue;
            width: 100vw;
            height: 55vh;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }


        .box {
            /* background-color:aqua; */
            width: 60px;
            height: 55px;
            text-align: center;
            justify-content: center;
            align-items: center;
            margin: 60px;
            padding: 40px;
            border-radius: 90px;



            /* Animation */

            animation-name: RajKaAnimation;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.21, 0.75, 0, 0.94);
            animation-delay: 2s;
            animation-direction: alternate-reverse;
            animation-play-state: running; 

            /* animation: name duration timing-function delay iteration-count direction fill-mode;

            /* animation: RajKaAnimation 2s ease-in 2s infinite alternate,
                Raj1 2s ease-in 2s infinite alternate; */

            /* animation: RajKaAnimation 2s ease-in 3s 1 backwards; */

        }


        /* Animation lagane ka tarika */
        @keyframes RajKaAnimation {
            from {
                background-color: red;
            }

            to {
                background-color: yellow;
                /* transform: translateX(1000px); */
            }
        }

        @keyframes Raj1 {
            0% {
                /* transform: rotate(45deg); */
                width: 10px;
            }

            20% {
                /* transform: rotate(90deg); */
                width: 20px;
            }

            40% {
                /* transform: rotate(180deg); */
                width: 40px;
            }

            80% {
                /* transform: rotate(270deg); */
                width: 80px;
            }

            100% {
                /* transform: rotate(500deg); */
                width: 100px;
            }
        }

    </style>
</head>

<body>
    <div class="container">

        <div class="box">
            Box
        </div>
        <div class="box">
            Box
        </div>
        <div class="box">
            Box
        </div>

    </div>

</body>

</html>
