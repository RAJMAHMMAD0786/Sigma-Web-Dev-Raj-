<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Bubbling :</title>

    <style>
        .child {
            padding: 15px;
            margin: 15px;
            border: 2px solid black;
            background-color: aliceblue;
        }

        .childcontainer {
            padding: 15px;
            margin: 15px;
            border: 2px solid black;
            background-color: rgb(83, 147, 202);
        }

        .container {
            padding: 15px;
            margin: 15px;
            border: 2px solid black;
            background-color: rgb(190, 195, 200);
        }
    </style>

</head>

<body>

    <div class="container">This is a container :
        <div class="childcontainer">This is a childcontainer:
            <div class="child">Thiis is a child :</div>
        </div>
    </div>

    <script>
        // event Bubbling ko rokane ke liye stopPropagation ka used kiya jata hai 
        document.querySelector(".child").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("child was clicked :");
        });

        document.querySelector(".childcontainer").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("childcontainer was clicked :");
        });

        document.querySelector(".container").addEventListener("click", (e) => {
            alert("container was clicked :");
        });



        // setInterval :-> setInterval diye gye time ke anusar har bar color ko change kar raha hai.
        // setInterval ko cancle karne ke liye (clearInterval) ka used kiya jata hai 
        
        function getRandomColor(){
            let val1=Math.ceil(0+Math.random()*255)
            let val2=Math.ceil(0+Math.random()*255)
            let val3=Math.ceil(0+Math.random()*255)
            return `rgb(${val1} , ${val2} , ${val3})`
        }

        // let a=setInterval(() => {
        //     document.querySelector(".childcontainer").style.backgroundColor=getRandomColor()
        // }, 1000);

        // console.log(a);


        // setTimeout ---> diye gye time ke anusar yek bar hi color ko change karta hai.
        let a=setTimeout(() => {
            document.querySelector(".childcontainer").style.backgroundColor=getRandomColor()
        }, 5000);

        console.log(a);

        // setTimeout ko cancle karne ke liye (clearTimeout) ka used kiya jata hai 

    </script>
</body>

</html>
