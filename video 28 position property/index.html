<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS position property</title>
    <style>
        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid black;
            padding: 20px;
            margin: 5px;
            height: 333px;
            width: 80vw;
        }

        .box1 {
            background-color: aqua;

            /* position: sticky;
            top: 0px;
            height: 75px;
            width: 100%;
            margin: 0;
            padding: 0; */

            position: absolute;
            /* position: fixed; */
            top: 0px;
            left: 60px;
        }

        .box2 {
            background-color: blue;

            /* position: relative; */
            bottom: 40px;
            left: 30px;
        }

        .box3 {
            background-color: cadetblue;

            /* position: fixed;
            bottom: 0px;
            left: 7vw;
            height: 150px; */
        }

        .box4 {
            background-color: darkgreen;
        }



        .parent {
            border: 3px solid brown;
            padding: 40px;
            margin: 35px;

            position: absolute;

            /*Exception:-  transform filter and perspective property can also make an element appear as possitioned */

            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */

        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
        <div class="box box4">box4</div>
    </div>

</body>

</html>
