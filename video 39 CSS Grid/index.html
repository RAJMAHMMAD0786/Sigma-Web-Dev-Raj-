<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container {
            border: 2px solid black;
            display: grid;
            grid-template-columns: [pahela]120px [dusara]100px [tisara];
            grid-template-rows: [pahela]100px [dusara]100px [tisara]100px;
        }

        .item {
            border: 2px solid red;
            height: 55px;
            width: 55px;

        }

        .item-4 {
            /* grid-row: 1/2;

            /* you can write */
            grid-row-start: 1;
            grid-row-end: 2;

            /* grid-column: 1/2;  */

            /* you can write */
            grid-column-start: 1;
            grid-column-end: 2;
        }

        .item-1 {
            /* grid-row: 1/2; */
            grid-row: 1/2;
            grid-column: pahela/dusara;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
    </div>
</body>

</html>
