<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Video & Audio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- you are given 12 files , 6 video and 6 audio . Design a website using HTML only which shows these 12 files
    1.mp4,2.mp4......6.mp4 
    1.mp3,2.mp3......6.mp3 -->

    <h1>Shows 12 file 6 Video and 6 Audion</h1>

    <div>
        <h2>Video File</h2>
        <ol>
            <li>
                <h3>Video 1</h3>
                <video height="240" src="videoplayback.mp4" controls autoplay loop muted></video>
            </li>
            <li>
                <h2>Video 2</h2>
                <video height="240" src="videoplayback (1).mp4" controls autoplay loop muted></video>
            </li>
            <li>
                <h3>Video 3</h3>
                <video height="240" src="videoplayback (2).mp4" controls autoplay loop muted></video>
            </li>
            <li>
                <h3>Video 4</h3>
                <video height="240" src="videoplayback (3).mp4" controls autoplay loop muted></video>
            </li>
            <li>
                <h3>Video 5</h3>
                <video height="240" src="videoplayback (4).mp4" controls autoplay loop muted></video>
            </li>
        </ol>

        <h2>Audio File</h2>

        <ol>
            <li>
                <h3>Audio 1</h3>
                <audio src="No Flubs - Surf Ninja 3.mp3" controls autoplay loop muted></audio>
            </li>
            <li>
                <h3>Audio 2</h3>
                <audio src="Sol en mi Cara - Luna Cantina.mp3" controls autoplay loop muted></audio>
            </li>
            <li>
                <h3>Audio 3</h3>
                <audio src="Viaje en Tren - Luna Cantina.mp3" controls autoplay loop muted></audio>
            </li>
            <li>
                <h3>Audio 4</h3>
                <audio src="Espiritus del Rio - Luna Cantina.mp3" controls autoplay loop muted></audio>
            </li>
            <li>
                <h3>Audio 5</h3>
                <audio src="Reunion Familiar - Luna Cantina.mp3" controls autoplay loop muted></audio>
            </li>
        </ol>
    </div>

</body>

</html>
