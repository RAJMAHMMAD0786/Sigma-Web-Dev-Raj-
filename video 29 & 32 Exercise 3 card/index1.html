<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desing Card Youself</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(95, 95, 112);
            padding: 30px;
        }

        .card {
            background-color: rgb(100, 100, 231);

            width: 550px;
            height: 350px;
            border-radius: 10px;
        }

        .image {
            text-align: right;
            padding: 5px;

        }

        .image img {
            border: 2px solid black;
            border-radius: 10px;
        }

        .content {
            font-size: 17px;
        }

        .content h3 {
            color: white;
        }

        .capsules {
            padding: 0 28px 0 14px;
        }

        .capsules p {
            color: rgb(250, 245, 245);
            padding: 4px;

        }

        .capsules span {
            border: 1px solid black;
            border-radius: 11px;
            color: rgb(243, 236, 236);
            padding: 0 6px;
            font-size: 15px;
            margin: 5px;
            cursor: pointer;
        }

        .capsules span:hover {
            background-color: rgb(123, 182, 129);
            color: black;
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="image">
            <img width="240" src="istockphoto-1583175338-1024x1024.jpg" alt="ATM Image">
        </div>

        <div class="content">
            <h3>The Britest bank card in your wallet</h3>
        </div>

        <div class="capsules">
            <!-- <span>Book a Card</span>
            <span>Read More</span> -->

            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Cupiditate quasi placeat veniam ratione est ex
                nemo, culpa, debitis impedit iste consequatur. Esse veritatis molestiae nam!</p>

            <span>Book a Card</span>
            <span>Read More</span>
        </div>


    </div>
</body>

</html>
