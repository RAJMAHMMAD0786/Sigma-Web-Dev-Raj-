<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Exercise :</title>
    <style>
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
        }
        .box{
            border: 2px solid black;
            height: 40px;
            width: 50px;
            padding: 10px;
            margin: 5px;

            justify-content: center;
            align-items: center;
            align-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="redbox1" class="box">Box 1</div>
        <div id="whitebox2" class="box">Box 2</div>
        <div id="greenbox3" class="box">Box 3</div>
        <div id="yellowbox4" class="box">Box 4</div>
        <div id="aquabox5" class="box">Box 5</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
